services:
  frontend:
    image: ${DOCKERHUB_USERNAME}/gasy-car-frontend:${IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      - backend

  backend:
    image: ${DOCKERHUB_USERNAME}/gasy-car-backend:${IMAGE_TAG}
    restart: unless-stopped
    env_file:
      - /opt/gasy-car/backend.env
    volumes:
      - backend_media:/app/media

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

volumes:
  backend_media:
